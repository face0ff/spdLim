name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create assets directory
        run: mkdir -p assets/sounds

      - name: Generate Flutter build files
        run: flutter build apk --release || true

      - name: Build APK via Gradle directly
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Find and copy APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null
          mkdir -p output
          APK=$(find . -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" output/speedlimit.apk
            echo "APK found and copied: $APK"
            ls -lh output/
          else
            echo "ERROR: No APK found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: speedlimit-apk
          path: output/speedlimit.apk
          retention-days: 30

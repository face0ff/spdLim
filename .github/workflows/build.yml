name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create assets directory
        run: mkdir -p assets/sounds

      - name: Build APK
        run: |
          flutter build apk --release
          mkdir -p output
          find build -name "*.apk" -exec cp {} output/speedlimit.apk \; 2>/dev/null || true
          ls -la output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedlimit-apk
          path: output/speedlimit.apk
          if-no-files-found: error
          retention-days: 30
